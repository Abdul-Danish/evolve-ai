<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .display { font-family: 'Sora', Arial, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>

    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#171526"/>
      <stop offset="55%" stop-color="#0F0E1A"/>
      <stop offset="100%" stop-color="#09080F"/>
    </radialGradient>

    <radialGradient id="orb" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#E4D9FF"/>
      <stop offset="28%" stop-color="#B79CFF"/>
      <stop offset="60%" stop-color="#8257E5"/>
      <stop offset="100%" stop-color="#3D2178"/>
    </radialGradient>

    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B7BFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9B7BFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7CF6"/>
      <stop offset="100%" stop-color="#5B3FD9"/>
    </linearGradient>

    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#09080F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#09080F" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="blur1"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint hex grid, sparse, right side -->
  <g stroke="#4A3F7A" stroke-opacity="0.18" stroke-width="1" fill="none">
    <path d="M 900 60 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
    <path d="M 952 90 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
    <path d="M 1004 60 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
    <path d="M 926 135 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
    <path d="M 978 165 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
    <path d="M 1030 135 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
    <path d="M 900 210 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
    <path d="M 1004 210 l 26 15 v30 l -26 15 -26 -15 v-30 z"/>
  </g>

  <!-- retrieval network radiating from the orb -->
  <g transform="translate(760,300)">
    <g stroke="#9B7BFF" stroke-opacity="0.35" stroke-width="1.2">
      <line x1="0" y1="0" x2="150" y2="-95"/>
      <line x1="0" y1="0" x2="185" y2="-10"/>
      <line x1="0" y1="0" x2="150" y2="90"/>
      <line x1="0" y1="0" x2="30" y2="150"/>
      <line x1="0" y1="0" x2="-40" y2="165"/>
      <line x1="0" y1="0" x2="205" y2="55"/>
    </g>
    <g fill="#C9B8FF">
      <circle cx="150" cy="-95" r="4"/>
      <circle cx="185" cy="-10" r="3.2"/>
      <circle cx="150" cy="90" r="4"/>
      <circle cx="30" cy="150" r="3.2"/>
      <circle cx="-40" cy="165" r="3.6"/>
      <circle cx="205" cy="55" r="3"/>
    </g>
  </g>

  <!-- orb glow + orb -->
  <circle cx="760" cy="300" r="230" fill="url(#orbGlow)" filter="url(#blur1)"/>
  <circle cx="760" cy="300" r="150" fill="url(#orb)"/>
  <ellipse cx="715" cy="255" rx="48" ry="30" fill="#FFFFFF" opacity="0.35" filter="url(#blur2)"/>

  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- top-left product icon -->
  <rect x="80" y="76" width="56" height="56" rx="16" fill="url(#icon)"/>
  <circle cx="108" cy="104" r="10" fill="#0F0E1A" opacity="0.35"/>
  <circle cx="108" cy="104" r="5.5" fill="#EDE7FF"/>

  <text x="152" y="98" class="display" font-size="17" font-weight="700" fill="#EFEAFF">Evolve AI</text>
  <text x="152" y="120" class="mono" font-size="13" fill="#9186B8" letter-spacing="1">ENTERPRISE RAG</text>

  <!-- headline -->
  <text x="80" y="330" class="display" font-size="64" font-weight="800" fill="#F7F5FF">Evolve AI</text>
  <text x="80" y="385" class="display" font-size="30" font-weight="600" fill="#C6B8F0">Enterprise Retrieval-Augmented Chat</text>

  <text x="80" y="440" class="mono" font-size="18" fill="#8A7FB8">Answers grounded in your knowledge base.</text>

  <!-- breadcrumb echo -->
  <text x="80" y="560" class="mono" font-size="16" fill="#665C93">Chat &#183; /api/v1/evolve/chat</text>

  <!-- status pill -->
  <circle cx="86" cy="592" r="4.5" fill="#7CF29C"/>
  <text x="100" y="597" class="mono" font-size="14" fill="#7CF29C">ready</text>
</svg>
