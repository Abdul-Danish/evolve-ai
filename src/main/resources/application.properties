spring.application.name=EvolveAI

spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_CHAT_MODEL:llama3.2}
spring.ai.ollama.embedding.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.schema-name=vector
spring.ai.vectorstore.pgvector.table-name=evolve_vector_store
spring.ai.vectorstore.pgvector.schema-validation=false

# DataSource Configuration
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${POSTGRES_USER_NAME}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=vector

## kafka config

spring.kafka.bootstrap-servers=http://localhost:9092

spring.kafka.consumer.group-id=evolve-ai
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
topic.vector.upload=vector_upload

## Minio config

spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

minio.bucket.name=${BUCKET_NAME:evolve}
minio.access.key=MINIO_ACCESS_KEY
minio.secret.key=MINIO_SECRET_KEY

minio.url=${OBJECT_STORAGE_URL:http://127.0.0.1:9000}
minio.base.path=${MINIO_BASE_PATH:SEARCH/}